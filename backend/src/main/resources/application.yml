spring:
  datasource:
    url: ${TOMODACHI_DATABASE_URL:jdbc:h2:mem:tomodachi;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${TOMODACHI_DATABASE_USER:sa}
    password: ${TOMODACHI_DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false
management:
  endpoints:
    web:
      exposure:
        include: health,info
springdoc:
  api-docs:
    path: /v3/api-docs
---
spring:
  config:
    activate:
      on-profile: deploy
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${TOMODACHI_DATABASE_URL:jdbc:postgresql://localhost:5432/tomodachi_dev}
    username: ${TOMODACHI_DATABASE_USER:tomodachi}
    password: ${TOMODACHI_DATABASE_PASSWORD:tomodachi}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${TOMODACHI_DATABASE_URL}
    username: ${TOMODACHI_DATABASE_USER}
    password: ${TOMODACHI_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
